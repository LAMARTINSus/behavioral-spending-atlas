{% extends 'base.html' %}
{% block content %}
<section class="card">
  <div class="eyebrow">Receive your full pilot report</div>
  <h2>Where should we send it?</h2>
  <p class="lead">This version is free. Enter your email and we’ll save your completed atlas and show your full report next.</p>
  {% if error %}<p class="error">{{ error }}</p>{% endif %}
  <form method="post" class="stack-form">
    <input type="email" name="email" placeholder="Email address" value="{{ email }}" required>
    <button class="btn primary" type="submit">Finish and open my report</button>
  </form>
</section>
{% endblock %}
